<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat Client</title>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .chat-container {
      width: 100%;
      max-width: 500px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      padding: 16px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff6b6b;
      transition: background 0.3s;
    }
    .status-dot.connected { background: #51cf66; }
    .chat-messages {
      flex: 1;
      padding: 20px;
      max-height: 400px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      padding: 10px 14px;
      border-radius: 18px;
      max-width: 80%;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease;
      line-height: 1.4;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.system {
      align-self: center;
      background: #e9ecef;
      color: #495057;
      font-size: 0.85rem;
      border-radius: 12px;
      font-style: italic;
    }
    .message.incoming {
      align-self: flex-start;
      background: #f1f3f5;
      color: #212529;
      border-bottom-left-radius: 4px;
    }
    .message.outgoing {
      align-self: flex-end;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message strong { color: #5c6bc0; }
    .message.outgoing strong { color: #e3f2fd; }
    .chat-input {
      padding: 16px;
      border-top: 1px solid #e9ecef;
      display: flex;
      gap: 10px;
      background: #f8f9fa;
    }
    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ced4da;
      border-radius: 24px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input input:focus { border-color: #667eea; }
    .chat-input button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 24px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .chat-input button:hover { box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
    .chat-input button:active { transform: scale(0.98); }
    .chat-input button:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="status-dot" id="statusDot"></div>
      <span>Chat Room</span>
    </div>
    <div class="chat-messages" id="messages"></div>
    <form class="chat-input" id="chatForm">
      <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off" disabled />
      <button type="submit" id="sendBtn" disabled>Send</button>
    </form>
  </div>

  <script>
    const SOCKET_URL = 'http://localhost:3002';
    const socket = io(SOCKET_URL, { transports: ['websocket'], reconnection: true });

    const messagesEl = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatForm = document.getElementById('chatForm');
    const statusDot = document.getElementById('statusDot');

    let mySocketId = '';

    function formatTime(isoString) {
      const date = new Date(isoString);
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function addMessage(text, senderId, timestamp, type = 'incoming') {
      const msgEl = document.createElement('div');
      msgEl.className = `message ${type}`;
      
      const time = formatTime(timestamp || new Date().toISOString());
      const shortId = senderId ? senderId.slice(0, 8) + '...' : '';
      const senderLabel = type === 'outgoing' ? 'You' : (type === 'system' ? 'System' : `Client ${shortId}`);
      
      msgEl.innerHTML = `
        <div style="font-size: 0.75rem; opacity: 0.8; margin-bottom: 4px;">
          <strong>${senderLabel}</strong> • ${time}
        </div>
        <div>${text.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}</div>
      `;
      messagesEl.appendChild(msgEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function updateConnectionStatus(connected) {
      statusDot.classList.toggle('connected', connected);
      messageInput.disabled = !connected;
      sendBtn.disabled = !connected;
      if (connected) messageInput.focus();
    }

    socket.on('connect', () => {
      mySocketId = socket.id;
      addMessage('✓ Connected to server', 'system', new Date().toISOString(), 'system');
      updateConnectionStatus(true);
    });

    socket.on('connect_error', () => {
      addMessage('✗ Connection failed', 'system', new Date().toISOString(), 'system');
      updateConnectionStatus(false);
    });

    socket.on('disconnect', () => {
      addMessage('✗ Disconnected', 'system', new Date().toISOString(), 'system');
      updateConnectionStatus(false);
    });

    socket.on('message', (data) => {
      addMessage(data.text, data.senderId, data.timestamp, 'incoming');
    });

    socket.on('userConnected', (data) => {
      if (data?.message) addMessage(data.message, 'system', data.timestamp, 'system');
    });

    socket.on('userDisconnected', (data) => {
      if (data?.message) addMessage(data.message, 'system', data.timestamp, 'system');
    });

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = messageInput.value.trim();
      if (!text || !socket.connected) return;

      socket.emit('newMessage', { text });
      addMessage(text, mySocketId, new Date().toISOString(), 'outgoing');
      messageInput.value = '';
      messageInput.focus();
    });

    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        chatForm.requestSubmit();
      }
    });

    updateConnectionStatus(false);
  </script>
</body>
</html>
